services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - vibe-remote
    restart: unless-stopped

  vibe-remote:
    build:
      context: .
      dockerfile: server/Dockerfile
    expose:
      - "8080"
    volumes:
      # Mount workspace for Claude to access
      - ${WORKSPACE_HOST_PATH:-/home/ubuntu}:/workspace:rw
      # Persist database
      - vibe-data:/app/data
      # Mount Claude credentials
      - ${HOME}/.claude:/home/node/.claude:rw
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:-}
      - CLAUDE_PERMISSION_MODE=bypassPermissions
      - DATABASE_PATH=./data/vibe-remote.db
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - WORKSPACE_HOST_PATH=${WORKSPACE_HOST_PATH:-/home/ubuntu}
      - WORKSPACE_CONTAINER_PATH=/workspace
      # AI Runner Limits (see .env.example for defaults)
      - RUNNER_TIMEOUT_MS=${RUNNER_TIMEOUT_MS:-600000}
      - MAX_CONCURRENT_RUNNERS=${MAX_CONCURRENT_RUNNERS:-3}
      - MAX_TURNS_CHAT=${MAX_TURNS_CHAT:-20}
      - MAX_TURNS_TASK=${MAX_TURNS_TASK:-30}
      - TOOL_APPROVAL_ENABLED=${TOOL_APPROVAL_ENABLED:-false}
      - TOOL_APPROVAL_TIMEOUT_MS=${TOOL_APPROVAL_TIMEOUT_MS:-120000}
      - CONTEXT_HISTORY_COUNT=${CONTEXT_HISTORY_COUNT:-5}
      # Rate Limiting
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-10}
      # Security
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  vibe-data:
  caddy-data:
  caddy-config:
